services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ob1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ob1}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ob1}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ob1-net

  app:
    build:
      context: ./app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ob1}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ob1}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-https://litellm.leadetic.com/v1}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      METADATA_MODEL: ${METADATA_MODEL:-gpt-4o-mini}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      PORT: "3000"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ob1-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ob1-net

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  ob1-net:
    driver: bridge
